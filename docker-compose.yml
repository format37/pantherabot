version: '3.8'
services:
  server:
    container_name: panthera_gptaidbot
    restart: always
    volumes:
      # - /etc/localtime:/etc/localtime:ro
      # - /etc/timezone:/etc/timezone:ro
      - ./data:/server/data
      - ./config.json:/server/config.json
      - ~/.claude:/home/appuser/.claude
      - ~/.claude.json:/home/appuser/.claude.json
      - type: bind
        source: /mnt/${BOT_TOKEN_WITHOUT_PREFIX}
        target: /${BOT_TOKEN_WITHOUT_PREFIX}
    cap_add:
      - DAC_READ_SEARCH
    build: server
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    network_mode: host
    environment:
      - TZ=America/Los_Angeles
      - WOLFRAM_ALPHA_APPID=${WOLFRAM_ALPHA_APPID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_USERNAME=${BOT_USERNAME}
      - PERPLEXITY_MCP_URL=${PERPLEXITY_MCP_URL}